name: Bug report
description: Report a reproducible defect
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Include a minimal reproduction.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.17.0"
