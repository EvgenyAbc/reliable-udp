name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify root package
        run: npm run verify

  validate-examples:
    runs-on: ubuntu-latest
    needs: validate-root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/package-lock.json

      - name: Install root package deps
        run: npm ci

      - name: Build root package for local file dependency
        run: npm run build

      - name: Install examples deps
        run: npm --prefix examples ci

      - name: Typecheck examples
        run: npm --prefix examples run typecheck

      - name: Test examples
        run: npm --prefix examples run test
